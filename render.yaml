databases:
  - name: financial-dashboard-db
    plan: free
    databaseName: financial_dashboard
    user: dashboard

services:
  - type: web
    name: financial-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: financial-dashboard-db
          property: connectionString
    plan: free
